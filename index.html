<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>新标签页</title>
  <link rel="icon" type="image/png" href="icon32.png"/>

  <style>
    * {margin:0;padding:0;box-sizing:border-box;}
    body{
      height:100vh;
      overflow:hidden;
      font-family:-apple-system,Segoe UI,Roboto;
      background: #222 center/cover no-repeat;
      transition:background 0.6s;
    }
    .container{
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:#333;
    }
    .title{
      font-size:42px;
      font-weight:500;
      margin-bottom:24px;
      color:#ffffff;
      text-shadow:0 1px 3px rgba(0,0,0,0.3);
    }
    .search{
      width:90%;max-width:560px;
    }
    .search input{
      width:100%;
      padding:14px 20px;
      border-radius:999px;
      border:1px solid #ddd;
      outline:none;
      font-size:16px;
      background:#ffffffee;
      transition:all .25s;
    }
    .search input:focus{
      box-shadow:0 2px 12px #00000018;
      border-color:#eee;
      transform:scale(1.02);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="title">多少个秋</div>
  <form class="search" action="https://www.bing.com/search">
    <input autocomplete="off" name="q" placeholder="使用 Bing 搜索"/>
  </form>
</div>

<script src="app.js"></script>
</body>
</html>
